<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Webcam · Toshiba Satellite L510</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.3rem 1rem 0.3rem 0.8rem;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .brand i {
            color: #e31b23;
            font-size: 1.3rem;
        }

        .header h1 {
            color: #fff;
            font-weight: 600;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .header h1 i {
            color: #6c8cff;
        }

        .status {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        .dot.active {
            background: #4caf50;
        }
        .dot.inactive {
            background: #f44336;
        }
        .dot.loading {
            background: #ff9800;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(0.8);
            }
        }

        .video-wrapper {
            position: relative;
            border-radius: 1.8rem;
            overflow: hidden;
            background: #0a0a0a;
            aspect-ratio: 4 / 3;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .device-info {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.7rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 5;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .device-info i {
            color: #6c8cff;
        }
        .device-info strong {
            color: #fff;
            font-weight: 600;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 1.2rem;
            align-items: center;
            justify-content: center;
        }

        .btn {
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: #6c8cff;
            color: #fff;
            border-color: #6c8cff;
        }
        .btn-primary:hover {
            background: #5a7ae8;
        }

        .btn-danger {
            background: #ff6b6b;
            color: #fff;
            border-color: #ff6b6b;
        }
        .btn-danger:hover {
            background: #e55555;
        }

        .btn-success {
            background: #4caf50;
            color: #fff;
            border-color: #4caf50;
        }
        .btn-success:hover {
            background: #3d9e40;
        }

        .btn-warning {
            background: #ff9800;
            color: #fff;
            border-color: #ff9800;
        }
        .btn-warning:hover {
            background: #e68900;
        }

        .btn i {
            font-size: 0.9rem;
        }

        .fallback {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.92);
            color: #fff;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            border-radius: 1.8rem;
            z-index: 10;
            backdrop-filter: blur(8px);
        }

        .fallback i {
            font-size: 4rem;
            color: #6c8cff;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .fallback h3 {
            font-weight: 400;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .fallback p {
            font-size: 0.9rem;
            opacity: 0.5;
            max-width: 80%;
        }

        .btn-retry {
            margin-top: 1rem;
            padding: 0.6rem 1.8rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            color: #fff;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-retry:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .info-box {
            margin-top: 1rem;
            padding: 0.8rem 1.2rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
        }

        .info-box i {
            color: #6c8cff;
            margin-right: 0.5rem;
        }

        @media (max-width: 650px) {
            .container {
                padding: 1rem;
                border-radius: 1.5rem;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .header h1 {
                font-size: 1.1rem;
            }
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .btn {
                justify-content: center;
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }
            .device-info {
                font-size: 0.6rem;
                padding: 0.2rem 0.7rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div class="header-left">
                <div class="brand">
                    <i class="fas fa-laptop"></i>
                    TOSHIBA
                </div>
                <h1>
                    <i class="fas fa-camera"></i>
                    Webcam
                </h1>
            </div>
            <div class="status">
                <span class="dot loading" id="statusDot"></span>
                <span id="statusText">Memulai...</span>
            </div>
        </div>

        <!-- VIDEO WRAPPER -->
        <div class="video-wrapper" id="videoWrapper">
            <video id="webcam" autoplay playsinline></video>

            <div class="device-info">
                <i class="fas fa-microchip"></i>
                <strong>Satellite L510</strong>
                <span style="opacity:0.5;">|</span>
                <i class="fas fa-camera"></i>
                <span>Webcam</span>
            </div>

            <div class="fallback" id="fallback">
                <i class="fas fa-video-slash"></i>
                <h3>Webcam tidak aktif</h3>
                <p id="fallbackText">Pastikan webcam laptop Toshiba Satellite L510 terhubung.</p>
                <button class="btn-retry" id="retryBtn">
                    <i class="fas fa-redo"></i> Coba Lagi
                </button>
            </div>
        </div>

        <!-- CONTROLS -->
        <div class="controls">
            <button class="btn btn-primary" id="startBtn">
                <i class="fas fa-play"></i> Mulai Webcam
            </button>
            <button class="btn btn-danger" id="stopBtn">
                <i class="fas fa-stop"></i> Hentikan
            </button>
            <button class="btn btn-success" id="snapshotBtn">
                <i class="fas fa-camera"></i> Ambil Foto
            </button>
            <button class="btn btn-warning" id="fullscreenBtn">
                <i class="fas fa-expand"></i> Layar Penuh
            </button>
        </div>

        <!-- INFO -->
        <div class="info-box">
            <i class="fas fa-info-circle"></i>
            Untuk Toshiba Satellite L510 · Gunakan Chrome, Edge, atau Firefox
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ===== DOM =====
            const video = document.getElementById('webcam');
            const fallback = document.getElementById('fallback');
            const fallbackText = document.getElementById('fallbackText');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const snapshotBtn = document.getElementById('snapshotBtn');
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            const retryBtn = document.getElementById('retryBtn');

            let stream = null;
            let isRunning = false;

            // ===== UPDATE STATUS =====
            function setStatus(text, state = 'loading') {
                statusText.textContent = text;
                statusDot.className = 'dot ' + state;
            }

            // ===== MULAI WEBCAM =====
            async function startWebcam() {
                try {
                    setStatus('Mengakses kamera...', 'loading');
                    fallback.style.display = 'none';

                    // Coba dengan constraint dasar untuk kompatibilitas maksimal
                    const constraints = {
                        video: {
                            width: { ideal: 640 },
                            height: { ideal: 480 },
                            facingMode: 'user'
                        },
                        audio: false
                    };

                    // Hentikan stream lama
                    if (stream) {
                        stream.getTracks().forEach(track => track.stop());
                        stream = null;
                    }

                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                    video.srcObject = stream;
                    await video.play();

                    isRunning = true;
                    setStatus('Webcam aktif ✅', 'active');
                    fallback.style.display = 'none';

                    console.log('Webcam Toshiba Satellite L510 berhasil diaktifkan');
                    console.log('Resolusi:', video.videoWidth + '×' + video.videoHeight);

                } catch (err) {
                    console.error('Error webcam:', err);
                    setStatus('Gagal ❌', 'inactive');
                    fallback.style.display = 'flex';
                    isRunning = false;

                    // Pesan error yang informatif
                    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                        fallbackText.textContent = 'Izin kamera ditolak. Klik ikon kunci di address bar dan izinkan kamera.';
                    } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                        fallbackText.textContent = 'Webcam tidak terdeteksi. Pastikan webcam Toshiba Satellite L510 terpasang dan driver terinstal.';
                    } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
                        fallbackText.textContent = 'Webcam sedang digunakan oleh aplikasi lain. Tutup aplikasi yang menggunakan kamera.';
                    } else if (err.name === 'OverconstrainedError') {
                        fallbackText.textContent = 'Resolusi tidak didukung. Coba gunakan pengaturan default.';
                    } else {
                        fallbackText.textContent = 'Error: ' + err.message;
                    }
                }
            }

            // ===== HENTIKAN WEBCAM =====
            function stopWebcam() {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                    stream = null;
                }
                video.srcObject = null;
                isRunning = false;
                setStatus('Dihentikan', 'inactive');
                fallback.style.display = 'flex';
                fallbackText.textContent = 'Webcam dihentikan. Klik "Mulai Webcam" untuk mengaktifkan kembali.';
            }

            // ===== AMBIL FOTO =====
            function takeSnapshot() {
                if (!isRunning || !stream) {
                    alert('Webcam belum aktif. Mulai webcam terlebih dahulu.');
                    return;
                }

                const canvas = document.createElement('canvas');
                const width = video.videoWidth || 640;
                const height = video.videoHeight || 480;
                canvas.width = width;
                canvas.height = height;

                const ctx = canvas.getContext('2d');
                // Mirror untuk selfie
                ctx.translate(width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(video, 0, 0, width, height);

                const link = document.createElement('a');
                link.download = `webcam_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            }

            // ===== FULLSCREEN =====
            function toggleFullscreen() {
                const wrapper = document.getElementById('videoWrapper');
                if (!document.fullscreenElement) {
                    wrapper.requestFullscreen?.() || wrapper.webkitRequestFullscreen?.();
                } else {
                    document.exitFullscreen?.() || document.webkitExitFullscreen?.();
                }
            }

            // ===== EVENT LISTENERS =====
            startBtn.addEventListener('click', startWebcam);
            stopBtn.addEventListener('click', stopWebcam);
            snapshotBtn.addEventListener('click', takeSnapshot);
            fullscreenBtn.addEventListener('click', toggleFullscreen);
            retryBtn.addEventListener('click', startWebcam);

            // ===== INIT =====
            // Cek dukungan webcam
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                setStatus('Tidak didukung ❌', 'inactive');
                fallback.style.display = 'flex';
                fallbackText.textContent = 'Browser Anda tidak mendukung WebRTC. Gunakan Chrome, Edge, atau Firefox.';
            } else {
                // Auto-start setelah 1 detik
                setTimeout(startWebcam, 1000);
            }

            // ===== CLEANUP =====
            window.addEventListener('beforeunload', function() {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
            });

            // ===== DEBUG =====
            console.log('Toshiba Satellite L510 Webcam Controller');
            console.log('Browser:', navigator.userAgent);
            console.log('MediaDevices tersedia:', !!navigator.mediaDevices);

        })();
    </script>

</body>
</html>
