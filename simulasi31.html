<!DOCTYPE html>
<html lang="id">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .header h1 {
            color: #fff;
            font-weight: 600;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .header h1 i {
            color: #6c8cff;
            font-size: 1.8rem;
        }

        .header .status {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            background: rgba(255, 255, 255, 0.06);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .header .status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        .header .status .dot.active {
            background: #4caf50;
        }

        .header .status .dot.inactive {
            background: #f44336;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(0.8);
            }
        }

        /* Video wrapper */
        .video-wrapper {
            position: relative;
            border-radius: 1.8rem;
            overflow: hidden;
            background: #0a0a0a;
            aspect-ratio: 4 / 3;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .video-wrapper canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
            transform: scaleX(-1);
        }

        /* Controls */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 1.2rem;
            align-items: center;
            justify-content: space-between;
        }

        .controls-left {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .controls-right {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: #6c8cff;
            color: #fff;
            border-color: #6c8cff;
        }

        .btn-primary:hover {
            background: #5a7ae8;
            border-color: #5a7ae8;
        }

        .btn-danger {
            background: #ff6b6b;
            color: #fff;
            border-color: #ff6b6b;
        }

        .btn-danger:hover {
            background: #e55555;
            border-color: #e55555;
        }

        .btn-success {
            background: #4caf50;
            color: #fff;
            border-color: #4caf50;
        }

        .btn-success:hover {
            background: #3d9e40;
            border-color: #3d9e40;
        }

        .btn i {
            font-size: 0.9rem;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 0.8rem;
            margin-top: 1.2rem;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 1.2rem;
            padding: 0.6rem 1rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .stat-item .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.4);
        }

        .stat-item .value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
            margin-top: 0.1rem;
        }

        .stat-item .value .highlight {
            color: #6c8cff;
        }

        /* Fallback */
        .fallback {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.9);
            color: #fff;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            border-radius: 1.8rem;
            z-index: 10;
        }

        .fallback i {
            font-size: 4rem;
            color: #6c8cff;
            margin-bottom: 1rem;
            opacity: 0.6;
        }

        .fallback h3 {
            font-weight: 400;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .fallback p {
            font-size: 0.9rem;
            opacity: 0.6;
            max-width: 80%;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 1rem;
                border-radius: 1.5rem;
            }
            .header h1 {
                font-size: 1.2rem;
            }
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .controls-left,
            .controls-right {
                justify-content: center;
            }
            .btn {
                padding: 0.4rem 1rem;
                font-size: 0.8rem;
            }
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>
                <i class="fas fa-face-smile"></i>
                FaceMesh
            </h1>
            <div class="status">
                <span class="dot active" id="statusDot"></span>
                <span id="statusText">Memulai...</span>
            </div>
        </div>

        <!-- VIDEO WRAPPER -->
        <div class="video-wrapper" id="videoWrapper">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="overlay"></canvas>

            <!-- Fallback -->
            <div class="fallback" id="fallback">
                <i class="fas fa-video-slash"></i>
                <h3>Webcam tidak tersedia</h3>
                <p id="fallbackText">Pastikan Anda telah mengizinkan akses kamera.</p>
            </div>
        </div>

        <!-- CONTROLS -->
        <div class="controls">
            <div class="controls-left">
                <button class="btn btn-primary" id="startBtn">
                    <i class="fas fa-play"></i> Mulai
                </button>
                <button class="btn btn-danger" id="stopBtn">
                    <i class="fas fa-stop"></i> Hentikan
                </button>
                <button class="btn" id="snapshotBtn">
                    <i class="fas fa-camera"></i> Foto
                </button>
            </div>
            <div class="controls-right">
                <button class="btn" id="fullscreenBtn">
                    <i class="fas fa-expand"></i>
                </button>
                <button class="btn btn-success" id="toggleMeshBtn">
                    <i class="fas fa-circle-nodes"></i> <span id="meshLabel">Sembunyikan</span>
                </button>
            </div>
        </div>

        <!-- STATS -->
        <div class="stats">
            <div class="stat-item">
                <div class="label">Wajah Terdeteksi</div>
                <div class="value" id="faceCount">0</div>
            </div>
            <div class="stat-item">
                <div class="label">Keypoints</div>
                <div class="value"><span class="highlight" id="keypointCount">0</span> / 468</div>
            </div>
            <div class="stat-item">
                <div class="label">FPS</div>
                <div class="value"><span class="highlight" id="fpsCounter">0</span> fps</div>
            </div>
            <div class="stat-item">
                <div class="label">Status</div>
                <div class="value" id="detectionStatus" style="font-size:0.9rem; color:#4caf50;">● Aktif</div>
            </div>
        </div>
    </div>

    <!-- ===== MEDIAPIPE FACE MESH ===== -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <script>
        (function() {
            'use strict';

            // ===== DOM ELEMENTS =====
            const video = document.getElementById('webcam');
            const canvas = document.getElementById('overlay');
            const ctx = canvas.getContext('2d');
            const fallback = document.getElementById('fallback');
            const fallbackText = document.getElementById('fallbackText');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const faceCountEl = document.getElementById('faceCount');
            const keypointCountEl = document.getElementById('keypointCount');
            const fpsCounterEl = document.getElementById('fpsCounter');
            const detectionStatusEl = document.getElementById('detectionStatus');

            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const snapshotBtn = document.getElementById('snapshotBtn');
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            const toggleMeshBtn = document.getElementById('toggleMeshBtn');
            const meshLabel = document.getElementById('meshLabel');

            // ===== STATE =====
            let faceMesh = null;
            let camera = null;
            let isRunning = false;
            let showMesh = true;
            let frameCount = 0;
            let lastFpsUpdate = performance.now();

            // ===== RESIZE CANVAS =====
            function resizeCanvas() {
                const rect = canvas.parentElement.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
            }

            window.addEventListener('resize', resizeCanvas);

            // ===== UPDATE STATUS =====
            function setStatus(text, isActive = true) {
                statusText.textContent = text;
                statusDot.className = 'dot ' + (isActive ? 'active' : 'inactive');
            }

            // ===== FACE MESH CALLBACK =====
            function onResults(results) {
                // Clear canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Update face count
                const faceCount = results.multiFaceLandmarks ? results.multiFaceLandmarks.length : 0;
                faceCountEl.textContent = faceCount;

                if (faceCount > 0) {
                    detectionStatusEl.textContent = '● Terdeteksi';
                    detectionStatusEl.style.color = '#4caf50';
                    keypointCountEl.textContent = results.multiFaceLandmarks[0].length || 0;

                    // Draw mesh jika aktif
                    if (showMesh) {
                        // TESSELASI (segitiga) - lebih detail
                        for (const landmarks of results.multiFaceLandmarks) {
                            // Gambar titik-titik
                            for (const landmark of landmarks) {
                                const x = landmark.x * canvas.width;
                                const y = landmark.y * canvas.height;

                                ctx.beginPath();
                                ctx.arc(x, y, 1.5, 0, 2 * Math.PI);
                                ctx.fillStyle = 'rgba(108, 140, 255, 0.8)';
                                ctx.fill();
                            }

                            // Gambar koneksi (tesselasi) menggunakan drawing_utils
                            // Tapi kita gambar manual untuk kontrol lebih baik
                            drawConnections(landmarks);
                        }
                    }
                } else {
                    detectionStatusEl.textContent = '● Tidak ada wajah';
                    detectionStatusEl.style.color = '#ff9800';
                    keypointCountEl.textContent = '0';
                }

                // Update FPS
                frameCount++;
                const now = performance.now();
                if (now - lastFpsUpdate > 1000) {
                    fpsCounterEl.textContent = frameCount;
                    frameCount = 0;
                    lastFpsUpdate = now;
                }
            }

            // ===== INISIALISASI FACE MESH =====
            function initFaceMesh() {
                faceMesh = new FaceMesh({
                    locateFile: (file) => {
                        return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
                    }
                });

                faceMesh.setOptions({
                    maxNumFaces: 4,
                    refineLandmarks: true,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });

                faceMesh.onResults(onResults);
            }

            // ===== MULAI KAMERA =====
            async function startCamera() {
                try {
                    setStatus('Mengakses kamera...', true);
                    fallback.style.display = 'none';

                    // Inisialisasi FaceMesh jika belum
                    if (!faceMesh) {
                        initFaceMesh();
                    }

                    // Mulai camera
                    camera = new Camera(video, {
                        onFrame: async () => {
                            if (isRunning && faceMesh) {
                                await faceMesh.send({ image: video });
                            }
                        },
                        width: 640,
                        height: 480
                    });

                    await camera.start();
                    isRunning = true;

                    setStatus('FaceMesh aktif ✅', true);
                    detectionStatusEl.textContent = '● Menunggu wajah';
                    detectionStatusEl.style.color = '#ff9800';

                    resizeCanvas();

                } catch (err) {
                    console.error('Error:', err);
                    setStatus('Gagal ❌', false);
                    fallback.style.display = 'flex';
                    fallbackText.textContent = err.message || 'Gagal mengakses webcam.';
                    isRunning = false;
                }
            }

            // ===== HENTIKAN =====
            function stopCamera() {
                if (camera) {
                    camera.stop();
                    camera = null;

                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(t => t.stop());
                    video.srcObject = null;
                }
                isRunning = false;
                setStatus('Dihentikan', false);
                detectionStatusEl.textContent = '● Tidak aktif';
                detectionStatusEl.style.color = '#f44336';
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                faceCountEl.textContent = '0';
                keypointCountEl.textContent = '0';
                fpsCounterEl.textContent = '0';
            }
