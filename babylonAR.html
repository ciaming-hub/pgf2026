<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visual Beta Partikel · 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #080818;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(8, 12, 30, 0.8);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            padding: 14px 32px;
            border-radius: 60px;
            border: 1px solid rgba(100, 180, 255, 0.3);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.9);
            font-size: 15px;
            letter-spacing: 0.4px;
            display: flex;
            align-items: center;
            gap: 22px;
            pointer-events: none;
            z-index: 10;
            white-space: nowrap;
        }
        #ui .badge {
            background: rgba(70, 160, 255, 0.2);
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 14px;
            color: #7fcbff;
            border: 1px solid rgba(70, 160, 255, 0.15);
        }
        #ui .count {
            font-weight: 700;
            color: #b3e0ff;
            min-width: 48px;
            display: inline-block;
            text-align: center;
            font-size: 17px;
        }
        #title {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 24px;
            border-radius: 40px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            letter-spacing: 1px;
            z-index: 10;
            pointer-events: none;
        }
        #title strong {
            color: rgba(130, 210, 255, 0.9);
            font-weight: 500;
        }
        @media (max-width: 640px) {
            #ui {
                font-size: 13px;
                padding: 12px 20px;
                gap: 14px;
                flex-wrap: wrap;
                justify-content: center;
                white-space: normal;
                bottom: 18px;
                max-width: 92vw;
            }
            #ui .badge {
                font-size: 12px;
                padding: 3px 12px;
            }
            #ui .count {
                font-size: 15px;
                min-width: 36px;
            }
            #title {
                font-size: 12px;
                padding: 6px 16px;
                top: 14px;
            }
        }
    </style>
</head>
<body>

    <div id="title">⚛ <strong>Beta</strong> · partikel berenergi tinggi</div>
    <div id="ui">
        <span>⚡ <span class="badge">β</span></span>
        <span>aktif · <span class="count" id="particleCount">0</span></span>
        <span style="opacity:0.4;">|</span>
        <span style="opacity:0.6; font-size:13px;">geser rotasi · gulir zoom</span>
    </div>

    <script type="importmap">
        {
            "imports": {
                "babylonjs": "https://cdn.babylonjs.com/babylon.js"
            }
        }
    </script>

    <script type="module">
        import * as BABYLON from 'babylonjs';

        // --- setup canvas & engine ---
        const canvas = document.createElement('canvas');
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        canvas.style.display = 'block';
        document.body.prepend(canvas);

        const engine = new BABYLON.Engine(canvas, true, {
            preserveDrawingBuffer: true,
            stencil: true,
            antialias: true
        });

        // --- scene ---
        const scene = new BABYLON.Scene(engine);
        scene.clearColor = new BABYLON.Color4(0.02, 0.02, 0.07, 1);

        // --- kamera arc rotate (diperbesar) ---
        const camera = new BABYLON.ArcRotateCamera(
            'camera',
            -Math.PI / 3.5,
            Math.PI / 3.2,
            5.5, // jarak lebih jauh agar objek besar terlihat utuh
            BABYLON.Vector3.Zero(),
            scene
        );
        camera.attachControl(canvas, true);
        camera.minZ = 0.5;
        camera.maxZ = 30;
        camera.wheelPrecision = 40;
        camera.lowerRadiusLimit = 2.5;
        camera.upperRadiusLimit = 14;
        camera.target = new BABYLON.Vector3(0, 0.3, 0);

        // --- pencahayaan (lebih terang) ---
        const ambientLight = new BABYLON.HemisphericLight('ambient', new BABYLON.Vector3(0, 1, 0), scene);
        ambientLight.intensity = 0.8;
        ambientLight.diffuse = new BABYLON.Color3(0.4, 0.6, 0.9);

        const dirLight = new BABYLON.DirectionalLight('dir', new BABYLON.Vector3(-1.5, 3, -1), scene);
        dirLight.intensity = 1.2;
        dirLight.diffuse = new BABYLON.Color3(0.8, 0.95, 1);

        const backLight = new BABYLON.DirectionalLight('back', new BABYLON.Vector3(0.8, 0.3, 1.5), scene);
        backLight.intensity = 0.7;
        backLight.diffuse = new BABYLON.Color3(0.4, 0.7, 1);

        // --- latar bintang (lebih banyak & terang) ---
        const starPositions = [];
        for (let i = 0; i < 600; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = 6 + Math.random() * 12;
            starPositions.push(
                Math.sin(phi) * Math.cos(theta) * r,
                Math.sin(phi) * Math.sin(theta) * r * 0.4,
                Math.cos(phi) * r
            );
        }
        const starInstance = BABYLON.MeshBuilder.CreatePoints('starsPoints', { points: starPositions }, scene);
        starInstance.color = new BABYLON.Color4(0.5, 0.8, 1, 0.7);
        starInstance.size = 0.025;

        // --- ANCHOR (pusat) dengan skala lebih besar ---
        const anchor = new BABYLON.TransformNode('anchor', scene);
        anchor.position.y = 0.25;
        anchor.scaling.set(1.6, 1.6, 1.6); // perbesar seluruh sistem

        // --- CORE GLOW (bola pusat besar) ---
        const coreGlow = BABYLON.MeshBuilder.CreateSphere('core', { diameter: 0.35 }, scene);
        const coreMat = new BABYLON.StandardMaterial('coreMat', scene);
        coreMat.emissiveColor = new BABYLON.Color3(0.3, 0.7, 1);
        coreMat.diffuseColor = new BABYLON.Color3(0.15, 0.4, 0.9);
        coreMat.alpha = 0.8;
        coreGlow.material = coreMat;
        coreGlow.parent = anchor;

        // --- AURA RING (cincin lebih besar) ---
        const ring1 = BABYLON.MeshBuilder.CreateTorus('ring1', { diameter: 1.2, thickness: 0.035 }, scene);
        const ringMat1 = new BABYLON.StandardMaterial('ringMat1', scene);
        ringMat1.emissiveColor = new BABYLON.Color3(0.4, 0.8, 1);
        ringMat1.alpha = 0.2;
        ring1.material = ringMat1;
        ring1.rotation.x = Math.PI / 2;
        ring1.parent = anchor;

        const ring2 = BABYLON.MeshBuilder.CreateTorus('ring2', { diameter: 1.6, thickness: 0.025 }, scene);
        const ringMat2 = new BABYLON.StandardMaterial('ringMat2', scene);
        ringMat2.emissiveColor = new BABYLON.Color3(0.2, 0.5, 0.95);
        ringMat2.alpha = 0.15;
        ring2.material = ringMat2;
        ring2.rotation.z = Math.PI / 3.5;
        ring2.rotation.x = Math.PI / 4;
        ring2.parent = anchor;

        const ring3 = BABYLON.MeshBuilder.CreateTorus('ring3', { diameter: 2.0, thickness: 0.02 }, scene);
        const ringMat3 = new BABYLON.StandardMaterial('ringMat3', scene);
        ringMat3.emissiveColor = new BABYLON.Color3(0.1, 0.4, 0.9);
        ringMat3.alpha = 0.1;
        ring3.material = ringMat3;
        ring3.rotation.y = Math.PI / 5;
        ring3.rotation.x = Math.PI / 3;
        ring3.parent = anchor;

        // --- PARTIKEL BETA UTAMA (diperbesar & diperbanyak) ---
        const particleSystem = new BABYLON.ParticleSystem('betaParticles', 1200, scene);

        // tekstur glow (lebih besar)
        const createGlowTexture = () => {
            const size = 128;
            const c = document.createElement('canvas');
            c.width = size;
            c.height = size;
            const ctx = c.getContext('2d');
            const grad = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(0.15, 'rgba(220,240,255,1)');
            grad.addColorStop(0.5, 'rgba(120,190,255,0.8)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, size, size);
            return new BABYLON.Texture(c, scene);
        };
        particleSystem.particleTexture = createGlowTexture();

        particleSystem.emitter = anchor;

        // area emisi diperluas
        particleSystem.minEmitBox = new BABYLON.Vector3(-0.6, -0.2, -0.6);
        particleSystem.maxEmitBox = new BABYLON.Vector3(0.6, 0.4, 0.6);

        // warna: biru cerah
        particleSystem.color1 = new BABYLON.Color4(0.5, 0.85, 1.0, 1.0);
        particleSystem.color2 = new BABYLON.Color4(0.2, 0.5, 1.0, 0.9);
        particleSystem.colorDead = new BABYLON.Color4(0.05, 0.1, 0.4, 0.0);

        // ukuran partikel lebih besar
        particleSystem.minSize = 0.06;
        particleSystem.maxSize = 0.25;
        particleSystem.minLifeTime = 0.5;
        particleSystem.maxLifeTime = 1.8;

        // kecepatan lebih tinggi
        particleSystem.direction1 = new BABYLON.Vector3(-1.8, -0.5, -1.8);
        particleSystem.direction2 = new BABYLON.Vector3(1.8, 1.2, 1.8);
        particleSystem.minEmitPower = 0.8;
        particleSystem.maxEmitPower = 2.8;

        particleSystem.gravity = new BABYLON.Vector3(0, -0.12, 0);
        particleSystem.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
        particleSystem.emitRate = 350;
        particleSystem.start();

        // --- PARTIKEL JEJAK (lebih banyak & besar) ---
        const trailSystem = new BABYLON.ParticleSystem('trailParticles', 500, scene);
        trailSystem.particleTexture = createGlowTexture();
        trailSystem.emitter = anchor;
        trailSystem.minEmitBox = new BABYLON.Vector3(-0.4, -0.1, -0.4);
        trailSystem.maxEmitBox = new BABYLON.Vector3(0.4, 0.2, 0.4);
        trailSystem.color1 = new BABYLON.Color4(0.8, 0.9, 1.0, 0.7);
        trailSystem.color2 = new BABYLON.Color4(0.3, 0.6, 1.0, 0.4);
        trailSystem.colorDead = new BABYLON.Color4(0.0, 0.1, 0.3, 0.0);
        trailSystem.minSize = 0.03;
        trailSystem.maxSize = 0.12;
        trailSystem.minLifeTime = 0.3;
        trailSystem.maxLifeTime = 1.0;
        trailSystem.direction1 = new BABYLON.Vector3(-2.8, -0.8, -2.8);
        trailSystem.direction2 = new BABYLON.Vector3(2.8, 1.6, 2.8);
        trailSystem.minEmitPower = 1.5;
        trailSystem.maxEmitPower = 3.8;
        trailSystem.gravity = new BABYLON.Vector3(0, -0.04, 0);
        trailSystem.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
        trailSystem.emitRate = 160;
        trailSystem.start();

        // --- PARTIKEL SINAR (lebih tebal & panjang) ---
        const raySystem = new BABYLON.ParticleSystem('rayParticles', 150, scene);
        raySystem.particleTexture = createGlowTexture();
        raySystem.emitter = anchor;
        raySystem.minEmitBox = new BABYLON.Vector3(-0.08, -0.03, -0.08);
        raySystem.maxEmitBox = new BABYLON.Vector3(0.08, 0.03, 0.08);
        raySystem.color1 = new BABYLON.Color4(0.9, 0.95, 1.0, 0.9);
        raySystem.color2 = new BABYLON.Color4(0.5, 0.8, 1.0, 0.5);
        raySystem.colorDead = new BABYLON.Color4(0.0, 0.0, 0.2, 0.0);
        raySystem.minSize = 0.015;
        raySystem.maxSize = 0.06;
        raySystem.minLifeTime = 0.15;
        raySystem.maxLifeTime = 0.7;
        raySystem.direction1 = new BABYLON.Vector3(-4.0, -1.5, -4.0);
        raySystem.direction2 = new BABYLON.Vector3(4.0, 2.5, 4.0);
        raySystem.minEmitPower = 3.0;
        raySystem.maxEmitPower = 5.5;
        raySystem.gravity = new BABYLON.Vector3(0, -0.02, 0);
        raySystem.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
        raySystem.emitRate = 70;
        raySystem.start();

        // --- update counter partikel ---
        const countEl = document.getElementById('particleCount');
        let totalActive = 0;
        setInterval(() => {
            totalActive = particleSystem.getActiveParticleCount() +
                trailSystem.getActiveParticleCount() +
                raySystem.getActiveParticleCount();
            countEl.textContent = totalActive;
        }, 400);

        // --- animasi ring & core ---
        scene.registerBeforeRender(() => {
            const time = Date.now() * 0.001;
            if (ring1) {
                ring1.rotation.z = time * 0.18;
                ring2.rotation.y = time * 0.13;
                ring2.rotation.x = Math.PI / 4 + Math.sin(time * 0.08) * 0.25;
                ring3.rotation.z = time * 0.1;
                ring3.rotation.x = Math.PI / 3 + Math.sin(time * 0.06 + 1) * 0.2;
            }
            if (coreGlow) {
                const scale = 1 + Math.sin(time * 2.5) * 0.08;
                coreGlow.scaling.set(scale, scale, scale);
            }
        });

        // --- render loop ---
        engine.runRenderLoop(() => {
            scene.render();
        });

        // --- resize ---
        window.addEventListener('resize', () => engine.resize());

        console.log('Visual Beta Partikel 3D - skala diperbesar');
    </script>
</body>
</html>
